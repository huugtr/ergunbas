<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ergünbaş Group</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;color:#111;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 10%;border-bottom:1px solid #eee;}
.logo img{height:45px;}
.lang button{margin-left:5px;border:none;background:#eee;padding:6px 10px;cursor:pointer;border-radius:5px;}

.hero{text-align:center;max-width:900px;margin:60px auto 20px;padding:0 10%;}
.hero h1{font-size:32px;margin-bottom:15px;}
.hero p{color:#555;}

.main{padding:20px 10%;max-width:1000px;margin:auto;}

.block{
margin-top:30px;
text-align:center;
padding:50px;
border-radius:14px;
border:1px solid #eee;
background:#fafafa;
}

.block:hover{transform:translateY(-5px);transition:0.2s;}

.product-logo{height:55px;margin-bottom:15px;}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 22px;
background:#111;
color:#fff;
text-decoration:none;
border-radius:8px;
}

.whatsapp{
margin-top:60px;
text-align:center;
padding:50px;
border-radius:14px;
background:#f5fff8;
border:1px solid #d9f7e3;
}

.whatsapp-btn{
display:inline-block;
margin-top:15px;
background:#25D366;
color:white;
padding:18px 28px;
border-radius:50px;
font-size:18px;
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="assets/logo.png">
</div>

<div class="lang">
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('tr')">TR</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('ar')">AR</button>
</div>
</header>

<div class="hero">
<h1 id="title"></h1>
<p id="desc"></p>
</div>

<div class="main">

<div class="block">
<img class="product-logo" src="assets/erdoor-logo.png">
<p id="erdoor"></p>
<a href="pdf/erdoor.pdf" class="btn" target="_blank" id="download1"></a>
</div>

<div class="block">
<img class="product-logo" src="assets/decker-logo.png">
<p id="decker"></p>
<a href="pdf/decker.pdf" class="btn" target="_blank" id="download2"></a>
</div>

<div class="whatsapp">
<h2 id="contactTitle"></h2>
<a class="whatsapp-btn" target="_blank" href="https://wa.me/213560585761">
💬 <span id="waText"></span>
</a>
</div>

</div>

<script>

const texts = {
fr:{
title:"Merci de votre visite à Batimatec 2026",
desc:"Accédez à nos catalogues et contactez-nous ci-dessous.",
erdoor:"Systèmes de portes composites haut de gamme.",
decker:"Solutions WPC extérieures.",
download:"Télécharger le catalogue",
whatsapp:"Contacter via WhatsApp",
contact:"Nos représentants"
},
tr:{
title:"Batimatec 2026 Fuarında Bizi Ziyaret Ettiğiniz İçin Teşekkür Ederiz",
desc:"Kataloglarımıza ve iletişim bilgilerine aşağıdan ulaşabilirsiniz.",
erdoor:"Yüksek kaliteli kapı sistemleri.",
decker:"WPC deck çözümleri.",
download:"Kataloğu İndir",
whatsapp:"WhatsApp ile İletişim",
contact:"Müşteri Temsilcilerimiz"
},
en:{
title:"Thank You for Visiting",
desc:"Access catalogs and contact us below.",
erdoor:"High-quality door systems.",
decker:"WPC deck solutions.",
download:"Download Catalog",
whatsapp:"Contact via WhatsApp",
contact:"Our Representatives"
},
ar:{
title:"شكراً لزيارتكم",
desc:"يمكنكم تحميل الكتالوج والتواصل معنا أدناه.",
erdoor:"أنظمة الأبواب.",
decker:"حلول الديك.",
download:"تحميل الكتالوج",
whatsapp:"واتساب",
contact:"الممثلون"
}
};

function setLang(lang){
const t = texts[lang];

document.documentElement.dir = (lang==="ar")?"rtl":"ltr";

document.getElementById("title").innerText = t.title;
document.getElementById("desc").innerText = t.desc;
document.getElementById("erdoor").innerText = t.erdoor;
document.getElementById("decker").innerText = t.decker;

document.getElementById("download1").innerText = t.download;
document.getElementById("download2").innerText = t.download;

document.getElementById("contactTitle").innerText = t.contact;
document.getElementById("waText").innerText = t.whatsapp;
}

setLang("fr");

</script>

</body>
</html>
